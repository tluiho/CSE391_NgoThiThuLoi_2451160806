<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop-Flower Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="animation-container">
        <div class="animated-card fade-in">
            <div class="img-container">
                <img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="Hoa Tulip">
            </div>
            
            <div class="card-content">
                <h3>Hoa Tulip Nhập Khẩu</h3>
                <p class="card-price">6.500.000 đ</p>
                
                <button class="btn-buy">Mua ngay</button>
            </div>
        </div>
    </div>

    <div class="spinner-zone">
        <p>Đang tìm thêm hoa đẹp...</p>
        <div class="loading-spinner"></div>
    </div>

</body>
</html>
