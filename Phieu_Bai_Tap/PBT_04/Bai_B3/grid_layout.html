<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CSS Grid E-Commerce</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <div class="grid-layout">
        <header class="header">HEADER (Full Width)</header>
        
        <section class="hero">
            <div class="featured-banner">HERO BANNER (Nổi bật chiếm 2 cột)</div>
            <div class="mini-banner">Sub Banner</div>
        </section>

        <aside class="sidebar">
            <h3>Bộ lọc bộ sản phẩm</h3>
            <label><input type="checkbox"> Giá dưới 10tr</label><br>
            <label><input type="checkbox"> Giá 10tr - 20tr</label>
        </aside>

        <main class="main-content">
            <!-- Grid con 3 cột bên trong Main -->
            <div class="product-item">Sản phẩm 1</div>
            <div class="product-item">Sản phẩm 2</div>
            <div class="product-item">Sản phẩm 3</div>
            <div class="product-item">Sản phẩm 4</div>
            <div class="product-item">Sản phẩm 5</div>
            <div class="product-item">Sản phẩm 6</div>
        </main>

        <aside class="ads">ADS BANNER</aside>

        <footer class="footer">FOOTER (Full Width)</footer>
    </div>

</body>
</html>
