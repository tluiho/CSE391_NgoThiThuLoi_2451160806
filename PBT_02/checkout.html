<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>
</head>
<body style="font-family: Arial; margin:20px;">

<h1>Thanh toán đơn hàng</h1>

<h2>Giỏ hàng</h2>
<table border="1" cellpadding="10">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>Áo thun</td>
            <td>100.000</td>
            <td>2</td>
            <td>200.000</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Quần jeans</td>
            <td>300.000</td>
            <td>1</td>
            <td>300.000</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Giày</td>
            <td>500.000</td>
            <td>1</td>
            <td>500.000</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="4"><b>Tổng cộng</b></td>
            <td><b>1.000.000</b></td>
        </tr>
    </tfoot>
</table>

<br>

<label>Tổng tiền:</label>
<output>1.000.000</output>

<br><br>

<label>Điểm tích lũy:</label>
<meter value="70" min="0" max="100"></meter>

<hr>

<form action="#" method="POST">

<h2>Thanh toán</h2>

<label>
<input type="radio" name="pay" required> COD
</label>

<label>
<input type="radio" name="pay"> Chuyển khoản
</label>

<label>
<input type="radio" name="pay"> Ví điện tử
</label>

<br><br>

<label for="coupon">Mã giảm giá:</label>
<input type="text" id="coupon"
       placeholder="SALE2026"
       pattern="^SALE[0-9]{4}$">

<br><br>

<label for="note">Ghi chú:</label>
<textarea id="note" rows="3"></textarea>

<hr>

<h2>Giao hàng</h2>

<label for="date">Ngày giao:</label>
<input type="date" id="date">

<script>
document.getElementById("date").min =
    new Date(Date.now()+86400000).toISOString().split("T")[0];
</script>

<br><br>

<label for="time">Khung giờ:</label>
<select id="time">
    <option>Sáng 8-12h</option>
    <option>Chiều 14-18h</option>
    <option>Tối 18-21h</option>
</select>

<br><br>

<label>Số ngày giao:</label>
<input type="range" min="1" max="7" step="1">

<br><br>

<label for="search">Tìm sản phẩm:</label>
<input list="products" id="search">
<datalist id="products">
    <option value="Áo thun">
    <option value="Quần jeans">
    <option value="Giày">
</datalist>

<br><br>

<button type="submit" aria-label="Xác nhận đặt hàng"> Đặt hàng
</button>

</form>

</body>
</html>
