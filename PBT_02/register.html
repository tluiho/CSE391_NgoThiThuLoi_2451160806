<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tài khoản</title>
</head>
<body>

    <h1>Đăng ký tài khoản</h1>
    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <label for="fullname">Họ tên:</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên của bạn" required minlength="2" maxlength="50"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required><br><br>

            <label for="phone">Số điện thoại:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="Nhập 10 chữ số" pattern="[0-9]{10}" required><br><br>

            <label for="dob">Ngày sinh:</label><br>
            <input type="date" id="dob" name="dob" max="2026-05-04" required><br><br>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username" placeholder="3-20 ký tự (chữ, số, _)" pattern="[a-zA-Z0-9_]{3,20}" required><br><br>

            <label for="password">Mật khẩu:</label><br>
            <input type="password" id="password" name="password" placeholder="Ít nhất 8 ký tự, 1 hoa, 1 số" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required><br><br>

            <label for="confirm-password">Xác nhận mật khẩu:</label><br>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required><br><br>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label><br>
            <select id="city" name="city" required>
                <option value="">-- Chọn Tỉnh/Thành phố --</option>
                <option value="hanoi">Hà Nội</option>
                <option value="danang">Đà Nẵng</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
                <option value="cantho">Cần Thơ</option>
                <option value="haiphong">Hải Phòng</option>
            </select><br><br>

            <label for="district">Quận/Huyện:</label><br>
            <select id="district" name="district" required>
                <option value="">-- Chọn Quận/Huyện --</option>
                <option value="q1">Quận 1</option>
                <option value="q2">Quận 2</option>
            </select><br><br>

            <label for="address">Địa chỉ chi tiết:</label><br>
            <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea><br><br>

            <label>Giới tính:</label><br>
            <input type="radio" id="male" name="gender" value="male"> <label for="male">Nam</label>
            <input type="radio" id="female" name="gender" value="female"> <label for="female">Nữ</label>
            <input type="radio" id="other" name="gender" value="other"> <label for="other">Khác</label><br><br>
        </fieldset>

        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">Tôi đồng ý với các điều khoản dịch vụ</label><br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>

    </form>
</body>
</html>
