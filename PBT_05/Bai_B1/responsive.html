<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Page</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <header class="header">
        <div class="logo">Shop-Flower</div>
        <input type="checkbox" id="menu-toggle" class="menu-checkbox" style="display:none;">
        <label for="menu-toggle" class="hamburger-btn">☰</label>
        <nav class="nav-menu">
            <a href="#">Trang chủ</a><a href="#">Sản phẩm</a><a href="#">Liên hệ</a>
        </nav>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <select class="filter-dropdown"><option>Chọn khoảng giá</option></select>
        </aside>

        <main class="product-grid">
            <div class="product-card">
                <img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP">
                <h4>Hoa tulip</h4>
                <p class="card-price">6.500.000 đ</p>
            </div>
            <div class="product-card"><img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP"><h4>Hoa hồng</h4><p class="card-price">2.000.000 đ</p></div>
            <div class="product-card"><img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP"><h4>Hoa cúc</h4><p class="card-price">1.000.000 đ</p></div>
            <div class="product-card"><img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP"><h4>Hoa lan</h4><p class="card-price">900.000 đ</p></div>
            <div class="product-card"><img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP"><h4>Hoa mẫu đơn</h4><p class="card-price">500.000 đ</p></div>
            <div class="product-card"><img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP"><h4>Hoa violet</h4><p class="card-price">3.000.000 đ</p></div>
            <div class="product-card"><img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP"><h4>Hoa hướng dương</h4><p class="card-price">4.000.000 đ</p></div>
            <div class="product-card"><img src="https://cdn.pixabay.com/photo/2020/04/28/12/58/tulips-5104396_960_720.jpg" alt="SP"><h4>Hoa iris</h4><p class="card-price">10.000.000 đ</p></div>
        </main>

        <aside class="ads-bar">Quảng cáo</aside>
    </div>

    <footer class="footer">&copy; Thuu Loi.</footer>
</body>
</html>
